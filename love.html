```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Ananya ❤️</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
text-align:center;
}

.envelope{
background:#ff4d6d;
color:white;
padding:25px 40px;
border-radius:10px;
cursor:pointer;
font-size:22px;
}

.container{
display:none;
background:white;
padding:30px;
border-radius:15px;
max-width:500px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
color:#ff4d6d;
}

#message{
font-size:18px;
min-height:120px;
}

button{
padding:10px 20px;
font-size:16px;
border:none;
border-radius:8px;
margin:10px;
cursor:pointer;
}

.yes{
background:#ff4d6d;
color:white;
}

.no{
background:#ccc;
}

.slideshow img{
width:100%;
border-radius:10px;
margin-top:15px;
}

.heart{
position:absolute;
color:red;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-900px);opacity:0;}
}

</style>
</head>

<body>

<div class="envelope" onclick="openLetter()">
💌 Click to open my heart
</div>

<div class="container" id="main">

<h1>My Dearest Ananya ❤️</h1>

<div id="message"></div>

<div class="slideshow">
<img id="photo" src="https://picsum.photos/400/250?1">
</div>

<h3>Do you love me? 😍</h3>

<button class="yes" onclick="love()">Yes ❤️</button>
<button class="no" onmouseover="moveButton(this)">No 😅</button>

</div>

<audio autoplay loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script>

function openLetter(){
document.querySelector(".envelope").style.display="none";
document.getElementById("main").style.display="block";
typeText();
}

const text="From the moment you came into my life, everything became more beautiful. Your smile makes my worst days better. You are my happiness, my peace, and my favorite person. I love you forever ❤️ — Yash";

let i=0;

function typeText(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(typeText,40);
}
}

function love(){
alert("YAY!!! I love you so much Ananya ❤️");
for(let i=0;i<50;i++){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.bottom="0";
document.body.appendChild(heart);
}
}

function moveButton(btn){
btn.style.position="absolute";
btn.style.left=Math.random()*80+"%";
btn.style.top=Math.random()*80+"%";
}

setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.bottom="0";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

},400);

const photos=[
"https://picsum.photos/400/250?1",
"https://picsum.photos/400/250?2",
"https://picsum.photos/400/250?3"
];

let p=0;

setInterval(()=>{
p=(p+1)%photos.length;
document.getElementById("photo").src=photos[p];
},3000);

</script>

</body>
</html>
